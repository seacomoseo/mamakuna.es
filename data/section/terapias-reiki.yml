  - order: 1
    md: |
      Jesús fue un ser humano que encarnó a Divinidad, su misión era mostrarnos a todos/as, que éramos mucho más de lo que pensábamos ser, que dentro de nosotros/as residía el amor de Dios, un amor que no conoce límites. Jesús abrió un camino para todos los que anhelamos encontrar la verdad de la existencia humana. Este camino continúa abierto hasta el fin de los tiempos.

      Su mensaje es el perdón y el amor sin condiciones, mediante el cual encontramos la comunión con Dios.

      Cuando amamos y perdonamos por lo que creemos que nos han hecho, salimos del juego de la mente programada y entramos en la Conciencia de Unidad, encontrando en el corazón la certeza de que al único ser al que estamos amando y perdonando es a nosotros/as mismos.
  - order: 4
    img: /u/fotos/afree-manos.webp
  - order: 3
    align_vl: right
    title: Sesión
    md: |
      El lugar desde el cual Jesús caminaba, hoy se le conoce como El Cristo, energía crística o conciencia crística.

      Esta frecuencia continúa activa en los planos sutiles de conciencia, siempre dispuesta a guiar el camino a todas las almas que la busquen.

      Esta es la energía, que pasa a través de mi para entrar en tu cuerpo energético, para reconfigurarlo con los códigos de "El Cristo".

      Es una honda de amor puro, incondicional y compasivo, que entra en cada uno de tus centros de energía (chakras), alineándote en la divinidad que eres, recordando la sabiduría que te habita y preparándote para caminar desde ella.

      Es un dulce abrazo, que viene a recordarte que eres hijo/hija de Dios y mereces absolutamente el amor en su estado más puro.
