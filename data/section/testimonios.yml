  - title: Indira T.
    # img: https://lh3.googleusercontent.com/a-/ALV-UjUGCJURTVBdqEBpxmETMHdyQ1q0xEO1DSn4_Rok0EsZTFn0tKzD=w136-h136-p-rp-mo-br100
    md: |
      Son varias las veces que he recibido los servicios de Afree.

      Para mí es un bálsamo.

      Es saber que voy al hogar, que estoy a salvo y que todo lo oscuro va a iluminarse, ya sea en mi, ya sea yendo a la luz.

      Me siento verdaderamente protegida en lo energético y sostenida en lo emocional.

      Recibo mi verdad cuando hablo con ella, una verdad a la que en ese momento no accedo por mí misma.

      Y ella la transmite con claridad, concreción, serenidad y un infinito amor.

      Realmente me encanta ese momento de terapia con ella porque sé que actualiza mis códigos, sé que eleva mi vibración y que me ayuda a ver y a recordar.

      Hay divinidad en el espacio que ella crea para ambas, hay respeto y hay consciencia, gratitud y perdón.

      Gracias Afree, cuando yo no puedo, tú me salvas ♥️

